name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        uv venv
        source .venv/bin/activate
        uv pip install -e .[dev]
    
    - name: Run tests with coverage
      run: |
        source .venv/bin/activate
        pytest --cov=harness --cov-report=term-missing --cov-report=xml tests/ --ignore=tests/test_alerting.py --ignore=tests/test_component_tree.py --ignore=tests/test_confirmation.py --ignore=tests/test_db_tool.py --ignore=tests/test_filesystem_tool.py --ignore=tests/test_metrics.py --ignore=tests/test_permissions.py --ignore=tests/test_policy_engine.py --ignore=tests/test_resource_monitor.py --ignore=tests/test_service_manager.py --ignore=tests/test_state_store.py --ignore=tests/test_terminal_tool.py
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  python-lint:
    name: Python Linting
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    
    - name: Install dependencies
      run: |
        uv venv
        source .venv/bin/activate
        uv pip install -e .[dev]
    
    - name: Run Ruff
      run: |
        source .venv/bin/activate
        ruff check harness/
    
    - name: Run MyPy
      run: |
        source .venv/bin/activate
        mypy harness/ --ignore-missing-imports

  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libglib2.0-dev libgtk-3-dev

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
    
    - name: Build src-tauri
      run: |
        cargo build --manifest-path src-tauri/Cargo.toml --release
    
    - name: Run Rust tests
      run: |
        cargo test --manifest-path src-tauri/Cargo.toml

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: |
        cd react
        npm ci
    
    - name: Type check
      run: |
        cd react
        npm run typecheck
    
    - name: Build
      run: |
        cd react
        npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:

jobs:
  rust:
    name: Rust (cargo check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "harness-core -> target"
      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsqlite3-dev
      - run: cargo check --workspace
      - run: cargo test --workspace --no-run

  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q hatch
      - run: cd inference-backend && pip install -q -e ".[dev]"
      - run: cd inference-backend && python -m pytest tests/ -x -q --tb=short 2>&1 || true

  typescript:
    name: TypeScript (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd harness-ui && npm install
      - run: cd harness-ui && npx tsc --noEmit

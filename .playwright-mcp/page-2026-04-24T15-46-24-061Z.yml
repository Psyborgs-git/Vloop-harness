            - paragraph [ref=e35]:
              - strong [ref=e36]: The AI orchestration of your wildest imagination.
            - paragraph [ref=e37]: n8n is the open workflow orchestration platform built for the new era of AI. We give technical teams the freedom of code with the speed of no-code, so they can automate faster, smarter, and without limits. Backed by a fiercely inventive community and 500+ builder-approved integrations, we’re changing the way people bring systems together and scale ideas for impact.
            - paragraph [ref=e38]
            - paragraph [ref=e39]: "Since our founding in 2019, we’ve grown into a diverse team of over 220 - working across Europe and the US, connected by a shared builder spirit and with our centre of gravity in Berlin. Along the way, we’ve:"
            - paragraph [ref=e40]
            - list [ref=e41]:
              - listitem [ref=e42]:
                - paragraph [ref=e43]: Cultivated a community of more than 650,000 active developers and builders
              - listitem [ref=e44]:
                - paragraph [ref=e45]: Earned 145k+ GitHub stars, making us one of the world’s Top 40 most popular projects
              - listitem [ref=e46]:
                - paragraph [ref=e47]: Been ranked as one of Europe’s most promising privately held SaaS startups (4th in Sifted’s 2025 B2B SaaS Rising 100)
              - listitem [ref=e48]:
                - paragraph [ref=e49]: Raised $240m to date, from Sequoia’s first German seed to our recent $180m Series C - bringing us to a $2.5bn valuation
            - paragraph [ref=e50]:
              - text: That’s the company we’ve built. Now we’d love to see what
              - emphasis [ref=e51]: you
              - text: "can build. If you’re applying, try n8n out - whether you’re technical or not - and share a screenshot of your first workflow with us. The easiest place to start is here:"
              - link "app.n8n.cloud/register" [ref=e52] [cursor=pointer]:
                - /url: http://app.n8n.cloud/register
              - text: .
            - paragraph [ref=e53]
            - paragraph [ref=e54]: We’re in a defining moment of an incredible journey. Come and build with us.
            - paragraph [ref=e55]:
              - strong [ref=e56]: AI Engineering Manager
            - paragraph [ref=e57]:
              - text: Your main goal will be to build and lead an engineering team that thrives in a fast-moving
              - strong [ref=e58]: agentic, AI-native world
              - text: "—developing engineers, creating clarity, and delivering meaningful outcomes with strong technical judgment. This is a first-line engineering leadership role for someone who is deeply technical, but whose real strength is building teams: empowering engineers on their growth path, aligning stakeholders, and helping people move with confidence as"
              - strong [ref=e59]: AI agents, workflow automation, and user expectations evolve rapidly
              - text: .
            - paragraph [ref=e60]:
              - text: You will lead teams working on
              - strong [ref=e61]: AI agents and agentic workflows within n8n
              - text: ", enabling users to orchestrate complex, multi-step automation across tools, data, and models. This includes shaping how"
              - strong [ref=e62]: LLMs, tools, APIs, and workflows come together into reliable, composable systems
              - text: that users can trust in production.
            - paragraph [ref=e63]

            - paragraph [ref=e112]:
              - strong [ref=e113]: Why join us?
            - paragraph [ref=e114]: "At n8n, you’ll join at a moment where strong engineering leadership can have outsized impact. We’re building in a space that is moving quickly, and we see that as an opportunity: to help teams stay ambitious, grounded, and effective while shaping what great engineering leadership looks like in an AI-native company. You’ll play a key role in building teams that empower others, act with integrity, move with speed and efficiency, and think bigger than incremental improvement. In a remote-first company growing fast, your work will directly influence how we scale our engineering organization and build the future of automation."
            - paragraph [ref=e115]:
              - emphasis [ref=e116]: n8n is an equal opportunity employer and does not discriminate on the basis of race, religion, colour, national origin, gender, sexual orientation, gender identity, age, marital status, veteran status, or disability status.
            - paragraph [ref=e117]:
              - emphasis [ref=e118]: We can sponsor visas to Germany; for any other country, you need to have existing right to work.
            - paragraph [ref=e119]:

            - paragraph [ref=e93]:
              - strong [ref=e94]: "Compensation Philosophy:"
            - paragraph [ref=e95]: We offer competitive compensation that includes base salary, variable compensation for relevant roles, meaningful equity, benefits, and perks. Actual compensation and offerings will vary based on role, level, and location. Team members in the EU, UK, and APAC receive locally competitive benefits aligned with regional norms and regulations.
